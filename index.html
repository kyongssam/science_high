<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주기율표 마스터 - 쿙쌤</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .grid-cols-18 { grid-template-columns: repeat(18, minmax(0, 1fr)); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // 아이콘 표시용 안전 컴포넌트
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (window.lucide && window.lucide.icons[name]) {
                        const icon = window.lucide.icons[name];
                        setSvg(icon.toSvg({ size, class: className }));
                    }
                }, 100);
                return () => clearTimeout(timer);
            }, [name, size, className]);
            
            if (!svg) return <span style={{width: size, height: size, display: 'inline-block'}}></span>;
            return <span className="inline-flex" dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const ELEMENTS_DATA = [
            { atomicNumber: 1, symbol: 'H', name: '수소', group: 1, period: 1, category: 'nonmetal', valence: 1 },
            { atomicNumber: 2, symbol: 'He', name: '헬륨', group: 18, period: 1, category: 'noble-gas', valence: 0 },
            { atomicNumber: 3, symbol: 'Li', name: '리튬', group: 1, period: 2, category: 'alkali-metal', valence: 1 },
            { atomicNumber: 4, symbol: 'Be', name: '베릴륨', group: 2, period: 2, category: 'metal', valence: 2 },
            { atomicNumber: 5, symbol: 'B', name: '붕소', group: 13, period: 2, category: 'metalloid', valence: 3 },
            { atomicNumber: 6, symbol: 'C', name: '탄소', group: 14, period: 2, category: 'nonmetal', valence: 4 },
            { atomicNumber: 7, symbol: 'N', name: '질소', group: 15, period: 2, category: 'nonmetal', valence: 5 },
            { atomicNumber: 8, symbol: 'O', name: '산소', group: 16, period: 2, category: 'nonmetal', valence: 6 },
            { atomicNumber: 9, symbol: 'F', name: '플루오린', group: 17, period: 2, category: 'halogen', valence: 7 },
            { atomicNumber: 10, symbol: 'Ne', name: '네온', group: 18, period: 2, category: 'noble-gas', valence: 0 },
            { atomicNumber: 11, symbol: 'Na', name: '나트륨', group: 1, period: 3, category: 'alkali-metal', valence: 1 },
            { atomicNumber: 12, symbol: 'Mg', name: '마그네슘', group: 2, period: 3, category: 'metal', valence: 2 },
            { atomicNumber: 13, symbol: 'Al', name: '알루미늄', group: 13, period: 3, category: 'metal', valence: 3 },
            { atomicNumber: 14, symbol: 'Si', name: '규소', group: 14, period: 3, category: 'metalloid', valence: 4 },
            { atomicNumber: 15, symbol: 'P', name: '인', group: 15, period: 3, category: 'nonmetal', valence: 5 },
            { atomicNumber: 16, symbol: 'S', name: '황', group: 16, period: 3, category: 'nonmetal', valence: 6 },
            { atomicNumber: 17, symbol: 'Cl', name: '염소', group: 17, period: 3, category: 'halogen', valence: 7 },
            { atomicNumber: 18, symbol: 'Ar', name: '아르곤', group: 18, period: 3, category: 'noble-gas', valence: 0 },
            { atomicNumber: 19, symbol: 'K', name: '칼륨', group: 1, period: 4, category: 'alkali-metal', valence: 1 },
            { atomicNumber: 20, symbol: 'Ca', name: '칼슘', group: 2, period: 4, category: 'metal', valence: 2 },
            { atomicNumber: 35, symbol: 'Br', name: '브로민', group: 17, period: 4, category: 'halogen', valence: 7 },
            { atomicNumber: 53, symbol: 'I', name: '아이오딘', group: 17, period: 5, category: 'halogen', valence: 7 },
            { atomicNumber: 26, symbol: 'Fe', name: '철', category: 'metal', isExtra: true },
            { atomicNumber: 28, symbol: 'Ni', name: '니켈', category: 'metal', isExtra: true },
            { atomicNumber: 29, symbol: 'Cu', name: '구리', category: 'metal', isExtra: true },
            { atomicNumber: 30, symbol: 'Zn', name: '아연', category: 'metal', isExtra: true },
            { atomicNumber: 47, symbol: 'Ag', name: '은', category: 'metal', isExtra: true },
            { atomicNumber: 79, symbol: 'Au', name: '금', category: 'metal', isExtra: true },
            { atomicNumber: 80, symbol: 'Hg', name: '수은', category: 'metal', isExtra: true },
            { atomicNumber: 82, symbol: 'Pb', name: '납', category: 'metal', isExtra: true },
            { atomicNumber: 92, symbol: 'U', name: '우라늄', category: 'metal', isExtra: true },
        ];

        const CATEGORY_LABELS = {
            'alkali-metal': '알칼리 금속',
            'halogen': '할로젠',
            'noble-gas': '비활성 기체',
            'nonmetal': '비금속',
            'metalloid': '준금속',
            'metal': '금속'
        };

        const CATEGORY_COLORS = {
            'nonmetal': 'bg-blue-50 border-blue-200 text-blue-700',
            'noble-gas': 'bg-purple-50 border-purple-200 text-purple-700',
            'alkali-metal': 'bg-red-50 border-red-200 text-red-700',
            'metal': 'bg-slate-50 border-slate-200 text-slate-700',
            'metalloid': 'bg-emerald-50 border-emerald-200 text-emerald-700',
            'halogen': 'bg-yellow-50 border-yellow-200 text-yellow-700',
        };

        const QUIZ_COUNT = 25;
        const TIMER_SECONDS = 8;

        function App() {
            const [view, setView] = useState('home');
            const [quizState, setQuizState] = useState({
                questions: [], currentIndex: 0, score: 0, showFeedback: false, selectedOption: null, timeLeft: TIMER_SECONDS
            });

            const startQuiz = () => {
                const shuffled = [...ELEMENTS_DATA].sort(() => Math.random() - 0.5).slice(0, QUIZ_COUNT);
                const questions = shuffled.map(el => {
                    const types = [0];
                    if (!el.isExtra) {
                        types.push(1, 3);
                        if (el.atomicNumber <= 20) types.push(2);
                        if (el.category !== 'metalloid') types.push(4);
                    }
                    const type = types[Math.floor(Math.random() * types.length)];
                    const display = Math.random() > 0.5 ? el.name : el.symbol;
                    let qText = "", ans = "", opts = [];

                    if (type === 0) {
                        qText = display === el.name ? `원소 '${el.name}'의 기호는?` : `원소 기호 '${el.symbol}'의 이름은?`;
                        ans = display === el.name ? el.symbol : el.name;
                        opts = [ans, ...ELEMENTS_DATA.filter(e => e.symbol !== el.symbol && e.name !== el.name).sort(() => Math.random() - 0.5).slice(0, 3).map(e => display === el.name ? e.symbol : e.name)];
                    } else if (type === 1) {
                        qText = `'${display}'은(는) 몇 족인가요?`;
                        ans = `${el.group}족`;
                        opts = [ans, "1족", "2족", "17족", "18족"].filter(o => o !== ans).slice(0, 3).concat(ans);
                    } else if (type === 2) {
                        qText = `'${display}'은(는) 몇 주기인가요?`;
                        ans = `${el.period}주기`;
                        opts = ["1주기", "2주기", "3주기", "4주기"].filter(o => o !== ans).slice(0, 3).concat(ans);
                    } else if (type === 3) {
                        qText = `'${display}'의 원자가 전자 수는?`;
                        ans = `${el.valence}개`;
                        opts = ["0개", "1개", "2개", "7개", "8개"].filter(o => o !== ans).slice(0, 3).concat(ans);
                    } else {
                        qText = `'${display}'은(는) 어디에 해당하나요?`;
                        ans = (['alkali-metal', 'halogen', 'noble-gas'].includes(el.category)) ? CATEGORY_LABELS[el.category] : (el.category.includes('metal') ? "금속" : "비금속");
                        opts = ["알칼리 금속", "할로젠", "비활성 기체", "금속", "비금속"].filter(o => o !== ans).slice(0, 3).concat(ans);
                    }
                    return { qText, ans, opts: Array.from(new Set(opts)).sort(() => Math.random() - 0.5) };
                });
                setQuizState({ questions, currentIndex: 0, score: 0, showFeedback: false, selectedOption: null, timeLeft: TIMER_SECONDS });
                setView('quiz');
            };

            const handleAnswer = useCallback((opt) => {
                if (quizState.showFeedback) return;
                const isCorrect = opt === quizState.questions[quizState.currentIndex].ans;
                setQuizState(prev => ({ ...prev, selectedOption: opt, showFeedback: true, score: isCorrect ? prev.score + 1 : prev.score }));
                setTimeout(() => {
                    if (quizState.currentIndex < QUIZ_COUNT - 1) {
                        setQuizState(prev => ({ ...prev, currentIndex: prev.currentIndex + 1, showFeedback: false, selectedOption: null, timeLeft: TIMER_SECONDS }));
                    } else { setView('result'); }
                }, 1500);
            }, [quizState]);

            useEffect(() => {
                if (view !== 'quiz' || quizState.showFeedback) return;
                if (quizState.timeLeft <= 0) { handleAnswer(null); return; }
                const timer = setInterval(() => { setQuizState(prev => ({ ...prev, timeLeft: prev.timeLeft - 1 })); }, 1000);
                return () => clearInterval(timer);
            }, [view, quizState.timeLeft, quizState.showFeedback, handleAnswer]);

            const feedback = useMemo(() => {
                const p = (quizState.score / QUIZ_COUNT) * 100;
                if (p === 100) return { t: "대단해요! 원소 마스터! 🏆", s: "완벽한 실력입니다!", i: "Trophy", c: "text-yellow-600" };
                if (p >= 90) return { t: "훌륭합니다! 우수한 실력! ✨", s: "만점이 코앞입니다!", i: "Star", c: "text-amber-600" };
                if (p >= 70) return { t: "잘하고 있어요! 수준급입니다. 👍", s: "조금만 더 힘내볼까요?", i: "ThumbsUp", c: "text-blue-600" };
                return { t: "노력이 필요해요! 💪", s: "학습 모드에서 더 공부해볼까요?", i: "AlertCircle", c: "text-slate-600" };
            }, [quizState.score]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex items-center justify-between mb-8">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-indigo-600 rounded-lg text-white"><LucideIcon name="Beaker" size={28} /></div>
                                <h1 className="text-2xl font-bold">주기율표 마스터</h1>
                            </div>
                            {view !== 'home' && <button onClick={() => setView('home')} className="flex items-center gap-1 text-slate-500 font-medium hover:text-indigo-600"><LucideIcon name="ChevronLeft" size={20} /> 처음으로</button>}
                        </header>

                        <main className="bg-white rounded-3xl shadow-xl p-6 md:p-8 min-h-[550px] flex flex-col relative overflow-hidden">
                            {view === 'home' && (
                                <div className="flex-1 flex flex-col items-center justify-center text-center space-y-8 max-w-4xl mx-auto">
                                    <div className="space-y-4">
                                        <h2 className="text-4xl font-black text-slate-800 leading-tight">원소 지식을 <br/><span className="text-indigo-600">완벽하게</span> 마스터하세요!</h2>
                                        <p className="text-slate-500">원소 기호, 족, 주기, 전자 수까지 퀴즈로 재미있게 암기해보세요.</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-lg">
                                        <button onClick={() => setView('study')} className="p-6 border-2 border-indigo-50 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50 text-left bg-white transition-all">
                                            <LucideIcon name="BookOpen" size={32} className="mb-3 text-indigo-600" />
                                            <h3 className="font-bold text-lg">학습 모드</h3>
                                            <p className="text-sm text-slate-500">원소 정보를 확인하며 공부합니다.</p>
                                        </button>
                                        <button onClick={startQuiz} className="p-6 border-2 border-emerald-50 rounded-2xl hover:border-emerald-500 hover:bg-emerald-50 text-left bg-white transition-all">
                                            <LucideIcon name="Brain" size={32} className="mb-3 text-emerald-600" />
                                            <h3 className="font-bold text-lg">실전 퀴즈</h3>
                                            <p className="text-sm text-slate-500">25문제를 8초 안에 도전하세요!</p>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {view === 'study' && (
                                <div className="flex-1 space-y-8">
                                    <h2 className="text-2xl font-bold flex items-center gap-2"><LucideIcon name="BookOpen" className="text-indigo-600" /> 주기율표 학습</h2>
                                    <div className="overflow-x-auto pb-6 custom-scrollbar">
                                        <div className="grid gap-2 min-w-[1050px] grid-cols-18">
                                            {ELEMENTS_DATA.filter(el => !el.isExtra).map(el => (
                                                <div key={el.atomicNumber} style={{ gridColumn: el.group, gridRow: el.period }} className={`p-2 border-2 rounded-xl flex flex-col items-center bg-white ${CATEGORY_COLORS[el.category] || 'bg-slate-50'}`}>
                                                    <span className="text-[8px] font-bold opacity-40">{el.atomicNumber}</span>
                                                    <span className="text-2xl font-black">{el.symbol}</span>
                                                    <span className="text-[10px] font-bold">{el.name}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <h3 className="font-bold text-slate-700">추가 금속 원소</h3>
                                    <div className="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-9 gap-2">
                                        {ELEMENTS_DATA.filter(el => el.isExtra).map(el => (
                                            <div key={el.atomicNumber} className="p-3 border-2 border-slate-100 rounded-xl flex flex-col items-center bg-white">
                                                <span className="text-2xl font-black">{el.symbol}</span>
                                                <span className="text-[10px] font-bold">{el.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'quiz' && (
                                <div className="flex-1 flex flex-col space-y-8 w-full max-w-4xl mx-auto">
                                    <div className="flex items-center justify-between">
                                        <div className="w-1/3"><div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-indigo-500 transition-all" style={{ width: `${((quizState.currentIndex + 1) / QUIZ_COUNT) * 100}%` }}></div></div></div>
                                        <div className="flex flex-col items-center w-1/3 text-slate-600"><LucideIcon name="Timer" size={24} /><span className="text-xl font-black">{quizState.timeLeft}s</span></div>
                                        <div className="w-1/3 text-right text-xl font-black text-indigo-600">{quizState.score}</div>
                                    </div>
                                    <div className="text-center py-4">
                                        <span className="px-4 py-1.5 bg-indigo-50 text-indigo-600 text-[10px] font-black rounded-full uppercase">Q. {quizState.currentIndex + 1} / {QUIZ_COUNT}</span>
                                        <h3 className="text-2xl md:text-4xl font-black text-slate-800 mt-4 break-keep">{quizState.questions[quizState.currentIndex].qText}</h3>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-xl mx-auto">
                                        {quizState.questions[quizState.currentIndex].opts.map((o, idx) => {
                                            const isC = o === quizState.questions[quizState.currentIndex].ans;
                                            const isS = quizState.selectedOption === o;
                                            let bCls = "p-6 border-2 rounded-2xl text-lg font-bold transition-all flex items-center justify-between ";
                                            if (quizState.showFeedback) {
                                                if (isC) bCls += "border-emerald-500 bg-emerald-50 text-emerald-700";
                                                else if (isS) bCls += "border-red-500 bg-red-50 text-red-700";
                                                else bCls += "opacity-40";
                                            } else { bCls += "border-slate-100 hover:border-indigo-400 bg-white"; }
                                            return <button key={idx} disabled={quizState.showFeedback} onClick={() => handleAnswer(o)} className={bCls}><span>{o}</span>{quizState.showFeedback && (isC ? <LucideIcon name="CheckCircle2" className="text-emerald-600" /> : isS ? <LucideIcon name="XCircle" className="text-red-600" /> : null)}</button>;
                                        })}
                                    </div>
                                </div>
                            )}

                            {view === 'result' && (
                                <div className="flex-1 flex flex-col items-center justify-center text-center space-y-8 max-w-xl mx-auto">
                                    <LucideIcon name={feedback.i} size={64} className={feedback.c} />
                                    <div className="text-6xl font-black">{quizState.score} <span className="text-xl text-slate-400">/ {QUIZ_COUNT}</span></div>
                                    <div className="space-y-2"><h2 className={`text-3xl font-black ${feedback.c}`}>{feedback.t}</h2><p className="text-slate-500 font-medium">{feedback.s}</p></div>
                                    <div className="flex gap-4 w-full pt-4">
                                        <button onClick={startQuiz} className="flex-[2] py-4 bg-indigo-600 text-white rounded-2xl font-black hover:bg-indigo-700 shadow-xl flex items-center justify-center gap-2"><LucideIcon name="RefreshCw" size={20} /> 다시 도전</button>
                                        <button onClick={() => setView('home')} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold">홈으로</button>
                                    </div>
                                </div>
                            )}
                        </main>
                        <footer className="mt-8 text-center text-slate-400 text-[11px] font-medium">Created by <span className="text-indigo-500 font-extrabold">쿙쌤</span></footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
